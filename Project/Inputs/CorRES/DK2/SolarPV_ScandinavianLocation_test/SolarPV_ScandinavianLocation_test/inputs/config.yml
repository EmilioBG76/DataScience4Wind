generic_farm:
  defaults:
    TI: 0.1
    rho: 1.225
  use_extended_table: true
generic_farm_vars:
  var_D: Rotor_diameter
  var_Nwt: Number_of_turbines
  var_TI: TI
  var_rho: Air_density
  var_sp: specific_power
  var_wind_MW_per_km2: wind_MW_per_km2
interpolation:
  n_stencil: 2
simulation:
  CSP:
    compute_dni_from_ghi: false
    model: ANI
    vars_nearest_xy:
    - varDNI
    vars_nearest_xyz: []
    vars_xy: []
    vars_xy_logz: []
    vars_xyz: []
  EXTRACT_ALL_ENTSOE:
    vars_nearest_xy:
    - varDNI
    - varDHI
    vars_nearest_xyz: []
    vars_xy: []
    vars_xy_logz:
    - varWS
    vars_xyz:
    - varWD
    - varRHO
  EXTRACT_ALL_ERA5:
    hi_wind_scaling: []
    mean_WS_scaler: None
    vars_nearest_xy: []
    vars_nearest_xyz: []
    vars_xy: []
    vars_xy_logz: []
    vars_xyz: []
  EXTRACT_ALL_NEWA:
    hi_wind_scaling: []
    mean_WS_scaler: None
    vars_nearest_xy: []
    vars_nearest_xyz: []
    vars_xy:
    - varTAIR
    vars_xy_logz: []
    vars_xyz: []
  SPP:
    ML_wake: false
    compute_dni_from_ghi: false
    mean_WS_scaler: GWA2
    vars_nearest_xy: []
    vars_nearest_xyz: []
    vars_xy:
    - varTAIR
    - varDNI
    - varDHI
    - varGHI
    vars_xy_logz:
    - varWS
    vars_xyz: []
  WPP:
    ML_wake: true
    hi_wind_scaling: []
    mean_WS_scaler: None
    storm_shutdown: true
    vars_nearest_xy: []
    vars_nearest_xyz: []
    vars_xy: []
    vars_xy_logz:
    - varWS
    vars_xyz: []
  WPP_wake:
    ML_wake: false
    hi_wind_scaling: []
    mean_WS_scaler: None
    storm_shutdown: true
    vars_nearest_xy: []
    vars_nearest_xyz: []
    vars_xy: []
    vars_xy_logz:
    - varWS
    vars_xyz:
    - varWD
weather_data:
  ERA5:
    container:
      dni_dir: /data/era5_irradiances_to_fix_corrected_longitude.zarr
      elevation: /data/SRTMv3_plus_ViewFinder_coarsen.nc
      hydro_dir: /data/era5_hydro_data.zarr
      mean_ws: /data/corres_preprocess/ERA5_mean_WS_2006_2018.zarr
      meso_dir: /data/corres_wind_zarr_monthly.zarr
    date_format: '%Y-%m-%d_%H:%M:%S'
    varDHI: DHI
    varDNI: DNI
    varEVAP: Evaporation
    varGHI: GHI
    varPERC: Total_precipitation
    varRHO: RHO
    varRMOL: RMOL
    varRNOF: Runoff
    varSNOWD: Snow_depth
    varSRF: Surface_runoff
    varSSRD: ''
    varSSRF: Sub_surface_runoff
    varTAIR: T2
    varUST: UST
    varWD: WD
    varWS: WS
    var_grid:
    - time
    - height
    - longitude
    - latitude
    var_x: Longitude
    var_x_grid: longitude
    var_y: Latitude
    var_y_grid: latitude
    var_z: Hub_height
    var_z_grid: height
  GWA2:
    container:
      mean_ws: /data/corres_preprocess/GWA2_mean_WS_low_resolution.zarr
    date_format: ''
    varDHI: ''
    varDNI: ''
    varGHI: ''
    varRHO: ''
    varRMOL: ''
    varTAIR: ''
    varUST: ''
    varWD: ''
    varWS: WS
    var_grid:
    - time
    - height
    - longitude
    - latitude
    var_x: Longitude
    var_x_grid: longitude
    var_y: Latitude
    var_y_grid: latitude
    var_z: Hub_height
    var_z_grid: height
  NEWA:
    container:
      crs_proj: +units=m +proj=lcc +lat_1=30.0 +lat_2=60.0 +lat_0=54.0 +lon_0=15.0
        +x_0=0 +y_0=0 +a=6370000 +b=6370000
      meso_dir: /data/newa.zarr
    date_format: '%Y-%m-%d_%H:%M:%S'
    varDHI: SWDDIR
    varDNI: SWDDNI
    varEVAP: ''
    varGHI: ''
    varPERC: ''
    varRHO: RHO
    varRMOL: RMOL
    varRNOF: ''
    varSNOWD: ''
    varSRF: ''
    varSSRD: ''
    varSSRF: ''
    varTAIR: T2
    varUST: UST
    varWD: WD
    varWS: WS
    var_grid:
    - time
    - height
    var_x: x
    var_x_grid: west_east
    var_y: y
    var_y_grid: south_north
    var_z: Hub_height
    var_z_grid: height
